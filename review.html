<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dissertation Reviewer</title>
<style>
:root{
  --bg:#ffffff; --bg-2:#f7f6f3; --bg-3:#efeee9; --text:#1a1a18; --text-2:#5f5e5a; --text-3:#8a8980;
  --border:rgba(0,0,0,.12); --border-2:rgba(0,0,0,.22);
  --info-bg:#e6f1fb; --info:#185fa5; --success-bg:#e1f5ee; --success:#0f6e56; --warn-bg:#faeeda; --warn:#854f0b;
  --r-md:8px; --r-lg:12px;
  --claim-bg:#e6f1fb; --claim:#0c447c; --figure-bg:#eeedfe; --figure:#26215c;
  --wording-bg:#f1efe8; --wording:#2c2c2a; --question-bg:#faeeda; --question:#633806;
  --citation-bg:#fbeaf0; --citation:#72243e;
  font-family:-apple-system,system-ui,"Segoe UI",sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1f1e1c; --bg-2:#272622; --bg-3:#302f2a; --text:#f3f1ec; --text-2:#b4b2a9; --text-3:#888780;
  --border:rgba(255,255,255,.14); --border-2:rgba(255,255,255,.26);
}}
*{box-sizing:border-box} body{margin:0;background:var(--bg-3);color:var(--text);font-size:14px;line-height:1.6}
button{font:inherit;color:inherit;background:var(--bg);border:.5px solid var(--border-2);border-radius:var(--r-md);padding:6px 12px;cursor:pointer}
button:hover{background:var(--bg-2)} button:active{transform:scale(.98)}
.hidden{display:none!important}
.textLayer{position:absolute;inset:0;overflow:hidden;line-height:1;text-size-adjust:none;forced-color-adjust:none;transform-origin:0 0}
.textLayer span,.textLayer br{color:transparent;position:absolute;white-space:pre;cursor:text;transform-origin:0 0}
.textLayer span::selection{background:rgba(80,130,230,.35)}
.textLayer ::selection{background:rgba(80,130,230,.35)}
#doc{max-width:760px;margin:0 auto;padding:28px 8px 120px;font-size:16px;line-height:1.75;color:var(--text)}
#doc h1{font-size:24px;font-weight:500;margin:0 0 18px;text-align:left}
#doc h2{font-size:20px;font-weight:500;margin:32px 0 10px}
#doc h3{font-size:17px;font-weight:500;margin:24px 0 8px;color:var(--text-2)}
#doc p{margin:0 0 14px}
#doc img{max-width:100%;height:auto;display:block;margin:14px auto;border:.5px solid var(--border);border-radius:6px;background:#fff}
#doc figure{margin:20px 0} #doc figcaption{font-size:13px;color:var(--text-2);margin-top:6px;text-align:center}
#doc .references,#doc #refs{font-size:13px;color:var(--text-2);border-top:.5px solid var(--border);margin-top:32px;padding-top:14px}
#doc ::selection{background:rgba(80,130,230,.30)}
.flash-html{background:var(--warn-bg);border-radius:3px;box-shadow:0 0 0 2px var(--warn-bg)}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body>
<div id="app">
  <header id="topbar"></header>
  <main id="panes" style="display:flex;min-height:calc(100vh - 49px)">
    <nav id="nav-pane"></nav>
    <section id="read-pane" style="flex:1;min-width:0"></section>
    <aside id="comments-pane"></aside>
  </main>
</div>
<script type="module" src="./js/app.js"></script>
</body>
</html>
